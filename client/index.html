<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proactive AI — Test Console</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
  .dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e; }

  .tabs {
    display: flex;
    border-bottom: 1px solid #222;
    padding: 0 32px;
  }
  .tab {
    padding: 12px 20px;
    cursor: pointer;
    color: #666;
    border-bottom: 2px solid transparent;
    font-size: 14px;
    transition: color 0.2s;
  }
  .tab.active { color: #fff; border-bottom-color: #6366f1; }

  .panel { display: none; padding: 32px; flex: 1; }
  .panel.active { display: block; }

  /* ── User ID bar ── */
  .user-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 14px 18px;
  }
  .user-bar label { font-size: 13px; color: #888; white-space: nowrap; }
  .user-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 14px;
  }

  /* ── Cards ── */
  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .card p  { font-size: 13px; color: #777; margin-bottom: 18px; line-height: 1.5; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary  { background: #6366f1; color: #fff; }
  .btn-danger   { background: #ef4444; color: #fff; }
  .btn-success  { background: #22c55e; color: #000; }
  .btn-ghost    { background: #2a2a2a; color: #ccc; }

  /* ── Record button (enrollment) ── */
  .record-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: all 0.2s;
    background: #2a2a2a;
    color: #e8e8e8;
    margin: 0 auto 12px;
  }
  .record-btn.recording {
    background: #ef4444;
    box-shadow: 0 0 0 8px rgba(239,68,68,0.2);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 8px rgba(239,68,68,0.2); }
    50%       { box-shadow: 0 0 0 16px rgba(239,68,68,0.05); }
  }

  /* ── Timer ── */
  .timer {
    text-align: center;
    font-size: 28px;
    font-variant-numeric: tabular-nums;
    color: #fff;
    margin-bottom: 4px;
  }
  .timer-label { text-align: center; font-size: 12px; color: #555; margin-bottom: 16px; }

  /* ── Status pill ── */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    background: #2a2a2a;
    color: #888;
  }
  .status.success { background: #052e16; color: #4ade80; }
  .status.error   { background: #2d0a0a; color: #f87171; }
  .status.loading { background: #1e1a35; color: #818cf8; }

  /* ── VAD status banner ── */
  .vad-banner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 24px;
    border-radius: 12px;
    margin-bottom: 20px;
    border: 1px solid #2a2a2a;
    background: #1a1a1a;
    transition: all 0.3s;
  }
  .vad-banner.listening  { border-color: #334155; }
  .vad-banner.speaking   { border-color: #1d4ed8; background: #0f172a; animation: speakpulse 1s infinite; }
  .vad-banner.processing { border-color: #7c3aed; background: #1e1035; }
  .vad-banner.offline    { border-color: #3f3f46; opacity: 0.6; }

  @keyframes speakpulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.2); }
    50%      { box-shadow: 0 0 0 8px rgba(99,102,241,0.0); }
  }

  .vad-icon { font-size: 28px; }
  .vad-label { font-size: 15px; font-weight: 600; color: #fff; }
  .vad-sub   { font-size: 12px; color: #666; margin-top: 2px; }

  /* ── Session start/stop ── */
  .session-btn {
    padding: 12px 32px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .session-btn.start { background: #22c55e; color: #000; }
  .session-btn.start:hover { background: #16a34a; }
  .session-btn.stop  { background: #ef4444; color: #fff; }
  .session-btn.stop:hover  { background: #dc2626; }

  /* ── Transcript ── */
  .transcript-box {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    min-height: 60px;
    font-size: 14px;
    line-height: 1.6;
    color: #ccc;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Result feed ── */
  .result-feed { display: flex; flex-direction: column; gap: 16px; }

  .result-card {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 16px 20px;
    animation: slidein 0.25s ease;
  }
  @keyframes slidein {
    from { opacity:0; transform: translateY(-8px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .result-card .rc-time { font-size: 11px; color: #444; margin-bottom: 8px; }
  .result-card .rc-transcript { font-size: 13px; color: #ccc; font-family: monospace; margin-bottom: 10px; line-height: 1.5; }

  .result-card .rc-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }

  .result-card .rc-suggestion {
    font-size: 13px;
    color: #c4b5fd;
    font-style: italic;
    background: #1c0f3f;
    border: 1px solid #4c1d95;
    border-radius: 6px;
    padding: 8px 12px;
    margin-top: 8px;
  }

  .result-card .rc-conf {
    font-size: 11px;
    color: #555;
    margin-top: 6px;
  }

  /* ── Analysis ── */
  .analysis-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    align-items: flex-start;
  }
  .analysis-label { color: #555; min-width: 110px; padding-top: 2px; }
  .analysis-value { color: #ddd; flex: 1; }
  .confidence-bar {
    height: 6px;
    border-radius: 3px;
    background: #2a2a2a;
    margin-top: 6px;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #6366f1, #22c55e);
    transition: width 0.4s ease;
  }

  /* ── Route badge ── */
  .route-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .route-AMBIENT  { background: #1e3a5f; color: #60a5fa; }
  .route-REACTIVE { background: #2d1b00; color: #fb923c; }
  .route-ACTIVE   { background: #052e16; color: #4ade80; }
  .route-SKIP     { background: #1a1a1a; color: #555; }

  /* ── Waveform ── */
  canvas { width: 100%; height: 48px; border-radius: 6px; display: block; }

  /* ── Grid ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }

  hr { border: none; border-top: 1px solid #222; margin: 20px 0; }
  .small { font-size: 12px; color: #555; }
</style>
</head>
<body>

<header>
  <div class="dot" id="serverDot"></div>
  <h1>Proactive AI — Test Console</h1>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('enroll')">① Enrollment</div>
  <div class="tab"        onclick="switchTab('session')">② Live Session</div>
</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- PANEL 1: Enrollment                                        -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="panel-enroll" class="panel active">

  <div class="user-bar">
    <label>User ID</label>
    <input id="enrollUserId" type="text" value="wearer" placeholder="your_username" />
  </div>

  <div class="card">
    <h2>Record your voice</h2>
    <p>Speak naturally for 5–10 seconds. This voice sample will be used to identify you during live sessions.</p>

    <button class="record-btn" id="enrollRecordBtn" onclick="toggleEnrollRecord()">🎙️</button>
    <div class="timer" id="enrollTimer">0:00</div>
    <div class="timer-label" id="enrollTimerLabel">Click to start recording</div>

    <canvas id="enrollWave"></canvas>
    <br>

    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-primary" id="enrollSubmitBtn" onclick="submitEnrollment()" disabled>
        ✓ Save Voiceprint
      </button>
      <button class="btn btn-ghost" onclick="playEnrollRecording()" id="enrollPlayBtn" disabled>
        ▶ Preview
      </button>
    </div>

    <br>
    <div id="enrollStatus"></div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- PANEL 2: Live Session (continuous VAD)                    -->
<!-- ══════════════════════════════════════════════════════════ -->
<div id="panel-session" class="panel">

  <div class="user-bar">
    <label>User ID</label>
    <input id="sessionUserId" type="text" value="wearer" placeholder="your_username" />
  </div>

  <!-- VAD status banner -->
  <div class="vad-banner offline" id="vadBanner">
    <div class="vad-icon" id="vadIcon">🔇</div>
    <div>
      <div class="vad-label" id="vadLabel">Session not started</div>
      <div class="vad-sub"   id="vadSub">Click Start Session to begin continuous listening</div>
    </div>
    <div style="margin-left:auto;">
      <button class="session-btn start" id="sessionToggleBtn" onclick="toggleSession()">▶ Start Session</button>
    </div>
  </div>

  <!-- Live waveform -->
  <div class="card" style="padding:16px;">
    <canvas id="sessionWave"></canvas>
  </div>

  <!-- Result feed -->
  <div id="resultFeed" class="result-feed"></div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', ['enroll','session'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

function setStatus(el, msg, type='') {
  el.innerHTML = `<span class="status ${type}">${msg}</span>`;
}

function formatTime(sec) {
  return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Server health
// ─────────────────────────────────────────────────────────────────────────────

async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    document.getElementById('serverDot').className = r.ok ? 'dot online' : 'dot';
  } catch { document.getElementById('serverDot').className = 'dot'; }
}
checkHealth();
setInterval(checkHealth, 5000);

// ─────────────────────────────────────────────────────────────────────────────
// Waveform visualiser (for enrollment)
// ─────────────────────────────────────────────────────────────────────────────

let enrollVisCtx = null, enrollVisFrame = null;

function startEnrollVisualiser(stream) {
  const actx = new AudioContext();
  const src   = actx.createMediaStreamSource(stream);
  const analyser = actx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);

  const canvas = document.getElementById('enrollWave');
  const c = canvas.getContext('2d');
  const buf = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    enrollVisFrame = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(buf);
    c.clearRect(0,0,canvas.width,canvas.height);
    c.fillStyle='#111'; c.fillRect(0,0,canvas.width,canvas.height);
    c.strokeStyle='#6366f1'; c.lineWidth=2; c.beginPath();
    const sl = canvas.width / buf.length; let x=0;
    buf.forEach((v,i)=>{ const y=(v/128)*canvas.height/2; i===0?c.moveTo(x,y):c.lineTo(x,y); x+=sl; });
    c.stroke();
  }
  draw();
}

function stopEnrollVisualiser() {
  if(enrollVisFrame) cancelAnimationFrame(enrollVisFrame);
  const canvas = document.getElementById('enrollWave');
  const c = canvas.getContext('2d');
  c.clearRect(0,0,canvas.width,canvas.height);
  c.fillStyle='#111'; c.fillRect(0,0,canvas.width,canvas.height);
}

// ─────────────────────────────────────────────────────────────────────────────
// Enrollment
// ─────────────────────────────────────────────────────────────────────────────

let enrollRecording=false, enrollMediaRecorder=null, enrollChunks=[], enrollBlob=null;
let enrollTimerInterval=null, enrollSeconds=0;

async function toggleEnrollRecord() {
  if (!enrollRecording) await startEnrollRecord();
  else stopEnrollRecord();
}

async function startEnrollRecord() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  enrollChunks = [];
  enrollMediaRecorder = new MediaRecorder(stream);
  enrollMediaRecorder.ondataavailable = e => enrollChunks.push(e.data);
  enrollMediaRecorder.onstop = () => {
    enrollBlob = new Blob(enrollChunks, { type:'audio/webm' });
    document.getElementById('enrollSubmitBtn').disabled = false;
    document.getElementById('enrollPlayBtn').disabled   = false;
    stream.getTracks().forEach(t => t.stop());
    stopEnrollVisualiser();
  };
  enrollMediaRecorder.start();
  enrollRecording = true;
  enrollSeconds   = 0;

  document.getElementById('enrollRecordBtn').className   = 'record-btn recording';
  document.getElementById('enrollRecordBtn').textContent = '⏹';
  document.getElementById('enrollTimerLabel').textContent = 'Recording… click to stop';

  enrollTimerInterval = setInterval(() => {
    enrollSeconds++;
    document.getElementById('enrollTimer').textContent = formatTime(enrollSeconds);
  }, 1000);

  startEnrollVisualiser(stream);
}

function stopEnrollRecord() {
  enrollMediaRecorder.stop();
  enrollRecording = false;
  clearInterval(enrollTimerInterval);
  document.getElementById('enrollRecordBtn').className   = 'record-btn';
  document.getElementById('enrollRecordBtn').textContent = '🎙️';
  document.getElementById('enrollTimerLabel').textContent = 'Recording saved — submit or re-record';
}

function playEnrollRecording() {
  if (!enrollBlob) return;
  new Audio(URL.createObjectURL(enrollBlob)).play();
}

async function submitEnrollment() {
  if (!enrollBlob) return;
  const userId = document.getElementById('enrollUserId').value.trim();
  if (!userId) { alert('Enter a user ID'); return; }

  const statusEl = document.getElementById('enrollStatus');
  setStatus(statusEl, 'Uploading…', 'loading');
  document.getElementById('enrollSubmitBtn').disabled = true;

  const form = new FormData();
  form.append('user_id', userId);
  form.append('audio', enrollBlob, 'enrollment.webm');

  try {
    const r    = await fetch('/api/enroll', { method:'POST', body:form });
    const data = await r.json();
    if (r.ok) {
      setStatus(statusEl, `✓ Enrolled as "${data.user_id}" (${data.duration_s}s)`, 'success');
      document.getElementById('sessionUserId').value = userId;
    } else {
      setStatus(statusEl, `✗ ${data.detail || 'Enrollment failed'}`, 'error');
    }
  } catch(e) {
    setStatus(statusEl, `✗ Network error: ${e.message}`, 'error');
  }
  document.getElementById('enrollSubmitBtn').disabled = false;
}

// ─────────────────────────────────────────────────────────────────────────────
// Live Session — Continuous VAD via AudioWorklet + WebSocket
// ─────────────────────────────────────────────────────────────────────────────

let sessionActive = false;
let sessionAudioCtx = null;
let sessionWorkletNode = null;
let sessionMicSource = null;
let sessionVisAnalyser = null, sessionVisFrame = null;
let sessionWs = null;

// The AudioWorkletProcessor (runs in a separate thread).
// Collects 512 float32 samples, converts to int16, sends over port.
const WORKLET_CODE = `
class PCMStreamer extends AudioWorkletProcessor {
  constructor() {
    super();
    this._buf = [];
  }
  process(inputs) {
    const ch = inputs[0] && inputs[0][0];
    if (!ch) return true;
    for (let i = 0; i < ch.length; i++) this._buf.push(ch[i]);
    while (this._buf.length >= 512) {
      const slice = this._buf.splice(0, 512);
      const out = new Int16Array(512);
      for (let i = 0; i < 512; i++)
        out[i] = Math.max(-32768, Math.min(32767, Math.round(slice[i] * 32767)));
      this.port.postMessage(out.buffer, [out.buffer]);
    }
    return true;
  }
}
registerProcessor('pcm-streamer', PCMStreamer);
`;

function setVadState(state) {
  const banner = document.getElementById('vadBanner');
  const icon   = document.getElementById('vadIcon');
  const label  = document.getElementById('vadLabel');
  const sub    = document.getElementById('vadSub');

  banner.className = `vad-banner ${state}`;
  const map = {
    offline:    { icon:'🔇', label:'Session not started',   sub:'Click Start Session to begin continuous listening' },
    listening:  { icon:'👂', label:'Listening…',            sub:'Speak naturally — VAD will detect when you start talking' },
    speaking:   { icon:'🗣️', label:'Speech detected',       sub:'VAD has detected voice activity — keep talking' },
    processing: { icon:'⚙️', label:'Processing utterance…', sub:'Running STT → speaker ID → AI analysis' },
  };
  const m = map[state] || map.offline;
  icon.textContent  = m.icon;
  label.textContent = m.label;
  sub.textContent   = m.sub;
}

function startSessionVisualiser(stream) {
  const actx    = new AudioContext();
  const src      = actx.createMediaStreamSource(stream);
  sessionVisAnalyser = actx.createAnalyser();
  sessionVisAnalyser.fftSize = 256;
  src.connect(sessionVisAnalyser);

  const canvas = document.getElementById('sessionWave');
  const c = canvas.getContext('2d');
  const buf = new Uint8Array(sessionVisAnalyser.frequencyBinCount);

  function draw() {
    sessionVisFrame = requestAnimationFrame(draw);
    sessionVisAnalyser.getByteTimeDomainData(buf);
    c.clearRect(0,0,canvas.width,canvas.height);
    c.fillStyle='#111'; c.fillRect(0,0,canvas.width,canvas.height);
    c.strokeStyle='#6366f1'; c.lineWidth=1.5; c.beginPath();
    const sl = canvas.width / buf.length; let x=0;
    buf.forEach((v,i)=>{ const y=(v/128)*canvas.height/2; i===0?c.moveTo(x,y):c.lineTo(x,y); x+=sl; });
    c.stroke();
  }
  draw();
}

function stopSessionVisualiser() {
  if(sessionVisFrame) cancelAnimationFrame(sessionVisFrame);
  const canvas = document.getElementById('sessionWave');
  const c = canvas.getContext('2d');
  c.clearRect(0,0,canvas.width,canvas.height);
  c.fillStyle='#111'; c.fillRect(0,0,canvas.width,canvas.height);
}

async function toggleSession() {
  if (!sessionActive) await startSession();
  else stopSession();
}

async function startSession() {
  const userId = document.getElementById('sessionUserId').value.trim() || 'wearer';

  // 1. Mic access
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    alert('Microphone access denied: ' + e.message);
    return;
  }

  // 2. AudioContext at 16 kHz (browser resamples mic → 16kHz automatically)
  sessionAudioCtx = new AudioContext({ sampleRate: 16000 });

  // 3. Load worklet from Blob URL
  const blob      = new Blob([WORKLET_CODE], { type:'application/javascript' });
  const blobUrl   = URL.createObjectURL(blob);
  await sessionAudioCtx.audioWorklet.addModule(blobUrl);
  URL.revokeObjectURL(blobUrl);

  // 4. Connect: mic → worklet
  sessionMicSource   = sessionAudioCtx.createMediaStreamSource(stream);
  sessionWorkletNode = new AudioWorkletNode(sessionAudioCtx, 'pcm-streamer');

  // 5. WebSocket
  const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
  sessionWs     = new WebSocket(`${wsProto}://${location.host}/ws/session/${encodeURIComponent(userId)}`);
  sessionWs.binaryType = 'arraybuffer';

  sessionWs.onopen = () => {
    console.log('[WS] connected');
    setVadState('listening');
    // Only start streaming AFTER ws is open
    sessionWorkletNode.port.onmessage = (e) => {
      if (sessionWs.readyState === WebSocket.OPEN)
        sessionWs.send(e.data);
    };
    sessionMicSource.connect(sessionWorkletNode);
    // Keep worklet alive (connect to destination muted)
    sessionWorkletNode.connect(sessionAudioCtx.destination);
  };

  sessionWs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleServerMessage(msg);
  };

  sessionWs.onerror = (e) => {
    console.error('[WS] error', e);
    setVadState('offline');
  };

  sessionWs.onclose = () => {
    console.log('[WS] closed');
    if (sessionActive) {
      setVadState('offline');
      stopSessionInternal();
    }
  };

  // 6. Visualiser (separate AudioContext at native rate for display only)
  startSessionVisualiser(stream);

  sessionActive = true;
  document.getElementById('sessionToggleBtn').className   = 'session-btn stop';
  document.getElementById('sessionToggleBtn').textContent = '⏹ Stop Session';
}

function stopSession() {
  stopSessionInternal();
  setVadState('offline');
  document.getElementById('sessionToggleBtn').className   = 'session-btn start';
  document.getElementById('sessionToggleBtn').textContent = '▶ Start Session';
}

function stopSessionInternal() {
  sessionActive = false;

  if (sessionWs) {
    sessionWs.onclose = null;   // prevent double-cleanup
    sessionWs.close();
    sessionWs = null;
  }

  if (sessionMicSource) {
    try { sessionMicSource.mediaStream.getTracks().forEach(t => t.stop()); } catch{}
    sessionMicSource = null;
  }
  if (sessionWorkletNode) { try { sessionWorkletNode.disconnect(); } catch{} sessionWorkletNode = null; }
  if (sessionAudioCtx)    { try { sessionAudioCtx.close(); }         catch{} sessionAudioCtx = null; }

  stopSessionVisualiser();
}

// ── Incoming server messages ──────────────────────────────────────────────────

function handleServerMessage(msg) {
  if (msg.type === 'vad_status') {
    setVadState(msg.status);   // 'listening' | 'speaking' | 'processing'
    return;
  }

  if (msg.type === 'error') {
    addResultCard({ _error: msg.message });
    return;
  }

  if (msg.type === 'result') {
    addResultCard(msg);
  }
}

function addResultCard(data) {
  const feed = document.getElementById('resultFeed');

  if (data._error) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `<div class="rc-time">${new Date().toLocaleTimeString()}</div>
      <span class="status error">⚠ ${data._error}</span>`;
    feed.prepend(card);
    return;
  }

  const route      = data.route || 'SKIP';
  const transcript = data.transcript || '(no speech)';
  const analysis   = data.analysis;
  const ttsText    = data.tts_text;
  const ttsAudio   = data.tts_audio;
  const wearer     = data.wearer_label || 'unknown';
  const conf       = analysis ? Math.round((analysis.confidence || 0)*100) : null;

  let html = `
    <div class="rc-time">${new Date().toLocaleTimeString()} · wearer: ${wearer}</div>
    <div class="rc-transcript">${escHtml(transcript)}</div>
    <div class="rc-meta">
      <span class="route-badge route-${route}">${route}</span>
      ${conf !== null ? `<span style="font-size:12px;color:#555;">confidence ${conf}%</span>` : ''}
    </div>`;

  if (analysis && analysis.summary)
    html += `<div style="font-size:13px;color:#aaa;margin-top:4px;">${escHtml(analysis.summary)}</div>`;

  if (ttsText)
    html += `<div class="rc-suggestion">💬 "${escHtml(ttsText)}"</div>`;

  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = html;
  feed.prepend(card);   // newest at top

  // Auto-play TTS
  if (ttsAudio) {
    const pcm  = Uint8Array.from(atob(ttsAudio), c => c.charCodeAt(0));
    const blob = new Blob([pcm], { type:'audio/wav' });
    const au   = new Audio(URL.createObjectURL(blob));
    au.play().catch(() => {});
  }

  // Trim feed to last 20 results
  while (feed.children.length > 20) feed.removeChild(feed.lastChild);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
